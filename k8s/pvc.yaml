apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubernetes-mcp-server-data
  namespace: mcp-kubernetes
  labels:
    app.kubernetes.io/name: kubernetes-platform-engineer
    app.kubernetes.io/component: mcp-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
