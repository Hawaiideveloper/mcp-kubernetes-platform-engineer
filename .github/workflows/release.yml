name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  release-image:
    name: Tag, push, and pin digest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Derive short SHA
        id: meta
        run: |
          echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push semver + sha tags
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hawaiideveloper/mcp-kubernetes-platform-engineer:${{ steps.meta.outputs.tag }}
            ghcr.io/hawaiideveloper/mcp-kubernetes-platform-engineer:sha-${{ steps.meta.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan release image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "ghcr.io/hawaiideveloper/mcp-kubernetes-platform-engineer:${{ steps.meta.outputs.tag }}"
          format: "table"
          severity: "HIGH,CRITICAL"
          exit-code: "1"

      - name: Pin digest in k8s/deployment.yaml
        run: |
          DIGEST="${{ steps.push.outputs.digest }}"
          REPO="ghcr.io/hawaiideveloper/mcp-kubernetes-platform-engineer"
          PINNED="${REPO}@${DIGEST}"
          sed -i "s|image: .*mcp-kubernetes-platform-engineer.*|image: ${PINNED}|" k8s/deployment.yaml

      - name: Set imagePullPolicy to IfNotPresent
        run: |
          sed -i "s|imagePullPolicy: Always|imagePullPolicy: IfNotPresent|" k8s/deployment.yaml

      - name: Commit pinned digest
        run: |
          git config user.name "albright-bot"
          git config user.email "bot@albright-labs.io"
          git add k8s/deployment.yaml
          git commit -m "feat(release): pin image digest for ${{ steps.meta.outputs.tag }}"
          git push origin HEAD:main
