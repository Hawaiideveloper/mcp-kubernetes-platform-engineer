---
apiVersion: v1
kind: Namespace
metadata:
  name: corey-fl-loop
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    owner: corey-fl-loop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-remediate-reader
  namespace: corey-fl-loop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-remediate-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: auto-remediate-reader
  namespace: corey-fl-loop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-remediate-bootstrap
  namespace: corey-fl-loop
data:
  bootstrap.sh: |
    #!/bin/bash
    set -e
    echo "[bootstrap] 2026-06-06T04:50:22Z starting"
    pip install --no-cache-dir --quiet "kubernetes>=28" "pydantic>=2" PyYAML
    cat > /tmp/runtime.py <<PYRT
    import logging, os, signal, sys, time
    from pathlib import Path
    LOG = logging.getLogger("auto_remediate.runtime")
    HEALTH = Path("/tmp/healthz")
    SHUTDOWN = False
    def _sig(*_):
        global SHUTDOWN; SHUTDOWN = True; LOG.info("shutdown requested")
    def main():
        logging.basicConfig(level=os.environ.get("LOG_LEVEL","INFO"),
                            format="%(asctime)s %(levelname)s %(name)s %(message)s")
        signal.signal(signal.SIGTERM,_sig); signal.signal(signal.SIGINT,_sig)
        from kubernetes import client, config
        config.load_incluster_config()
        v1 = client.CoreV1Api()
        ns_count = len(v1.list_namespace().items)
        LOG.info("connected to k8s; %d namespaces visible", ns_count)
        HEALTH.write_text("ready\n")
        LOG.info("auto_remediate.runtime ready; heartbeating")
        tick = 0
        while not SHUTDOWN:
            tick += 1
            HEALTH.write_text(f"alive tick={tick} ts={int(time.time())}\n")
            if tick % 10 == 0:
                LOG.info("alive tick=%d ns=%d", tick, ns_count)
            time.sleep(6)
        LOG.info("shutdown complete")
        return 0
    sys.exit(main())
    PYRT
    echo "[bootstrap] 2026-06-06T04:50:22Z ready"
    exec python3 /tmp/runtime.py
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-remediate
  namespace: corey-fl-loop
  labels: { app: auto-remediate, owner: corey-fl-loop }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: auto-remediate }
  template:
    metadata:
      labels: { app: auto-remediate, owner: corey-fl-loop }
    spec:
      serviceAccountName: auto-remediate-reader
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: runtime
          image: python:3.11-slim
          command: ["/bin/bash","/bootstrap/bootstrap.sh"]
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: HOME
              value: /tmp
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            exec: { command: ["sh","-c","test -f /tmp/healthz && grep -q alive /tmp/healthz"] }
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec: { command: ["sh","-c","test -f /tmp/healthz"] }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: bootstrap, mountPath: /bootstrap }
            - { name: pip-cache, mountPath: /.cache }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: pip-cache
          emptyDir: {}
        - name: bootstrap
          configMap:
            name: auto-remediate-bootstrap
            defaultMode: 0755
