---
apiVersion: v1
kind: Namespace
metadata:
  name: corey-fl-loop
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    owner: corey-fl-loop
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: auto-remediate-reader
  namespace: corey-fl-loop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: auto-remediate-reader-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: auto-remediate-reader
  namespace: corey-fl-loop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-remediate-bootstrap
  namespace: corey-fl-loop
data:
  bootstrap.sh: |
    #!/bin/bash
    set -e
    echo "[bootstrap] 2026-06-06T05:10:22Z starting"
    apt-get update -qq && apt-get install -y --no-install-recommends git ca-certificates >/dev/null && pip install --no-cache-dir --quiet "kubernetes>=28" "pydantic>=2" PyYAML croniter || true
    cd /tmp
    if [ ! -d repo ]; then
      git clone --depth 1 --quiet https://github.com/Hawaiideveloper/mcp-kubernetes-platform-engineer.git repo
    else
      cd repo && git pull --quiet && cd ..
    fi
    export PYTHONPATH=/tmp/repo:/tmp/repo/src
    echo "[bootstrap] 2026-06-06T05:10:22Z ready"
    exec python3 -m auto_remediate.runtime

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auto-remediate
  namespace: corey-fl-loop
  labels: { app: auto-remediate, owner: corey-fl-loop }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: auto-remediate }
  template:
    metadata:
      labels: { app: auto-remediate, owner: corey-fl-loop }
    spec:
      serviceAccountName: auto-remediate-reader
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
        runAsGroup: 0
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: runtime
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities: { drop: [\"ALL\"] }
          image: python:3.11-slim
          command: ["/bin/bash","/bootstrap/bootstrap.sh"]
          env:
            - name: LOG_LEVEL
              value: INFO
            - name: HOME
              value: /tmp
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            exec: { command: ["sh","-c","test -f /tmp/healthz && grep -q alive /tmp/healthz"] }
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            exec: { command: ["sh","-c","test -f /tmp/healthz"] }
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: bootstrap, mountPath: /bootstrap }
            - { name: pip-cache, mountPath: /.cache }
      volumes:
        - name: tmp
          emptyDir: {}
        - name: pip-cache
          emptyDir: {}
        - name: bootstrap
          configMap:
            name: auto-remediate-bootstrap
            defaultMode: 0755
