# Corey-FL-Loop task queue. 24h TTL on keys per spec; no persistence (emptyDir).
# Lives in corey-coder ns next to corey-rag and corey-coder-autonomous.
---
apiVersion: v1
kind: Service
metadata:
  name: corey-fl-redis
  namespace: corey-coder
  labels:
    app: corey-fl-redis
    component: task-queue
    owner: corey-fl-loop
spec:
  type: ClusterIP
  selector:
    app: corey-fl-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: corey-fl-redis
  namespace: corey-coder
  labels:
    app: corey-fl-redis
    component: task-queue
    owner: corey-fl-loop
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: corey-fl-redis
  template:
    metadata:
      labels:
        app: corey-fl-redis
        component: task-queue
        owner: corey-fl-loop
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - redis-server
            - --save
            - "60 1"
            - --appendonly
            - "no"
            - --maxmemory
            - "256mb"
            - --maxmemory-policy
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "320Mi"
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "PING"]
            initialDelaySeconds: 2
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: corey-fl-redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: corey-fl-redis-data
  namespace: corey-coder
  labels:
    app: corey-fl-redis
    component: task-queue
    owner: corey-fl-loop
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
