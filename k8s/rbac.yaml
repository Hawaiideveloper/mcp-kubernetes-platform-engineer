apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubernetes-mcp-server-sa
  namespace: mcp-kubernetes
  labels:
    app.kubernetes.io/name: kubernetes-platform-engineer
    app.kubernetes.io/component: mcp-server
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubernetes-mcp-server-role
  labels:
    app.kubernetes.io/name: kubernetes-platform-engineer
    app.kubernetes.io/component: mcp-server
rules:
# Core resources for cluster management
- apiGroups: [""]
  resources: ["nodes", "namespaces", "pods", "services", "endpoints", "persistentvolumes", "persistentvolumeclaims", "configmaps", "secrets", "events"]
  verbs: ["get", "list", "watch"]
# Extended resources for monitoring
- apiGroups: [""]
  resources: ["pods/log", "pods/status", "nodes/status"]
  verbs: ["get", "list"]
# Apps resources
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
# Networking resources
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["get", "list", "watch"]
# Storage resources
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses", "volumeattachments"]
  verbs: ["get", "list", "watch"]
# Metrics and monitoring
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]
# RBAC resources (read-only for security scanning)
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
# Policy resources
- apiGroups: ["policy"]
  resources: ["podsecuritypolicies", "poddisruptionbudgets"]
  verbs: ["get", "list", "watch"]
# Extensions for legacy compatibility
- apiGroups: ["extensions"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubernetes-mcp-server-binding
  labels:
    app.kubernetes.io/name: kubernetes-platform-engineer
    app.kubernetes.io/component: mcp-server
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubernetes-mcp-server-role
subjects:
- kind: ServiceAccount
  name: kubernetes-mcp-server-sa
  namespace: mcp-kubernetes
