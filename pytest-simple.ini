[pytest]
# Pytest configuration for Kubernetes Platform Engineer MCP Server
minversion = 7.0
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test markers for different test categories
markers =
    unit: Unit tests for individual components
    integration: Integration tests requiring external dependencies
    performance: Performance and benchmark tests
    security: Security and vulnerability tests
    production: Production issue resolution tests
    slow: Tests that take more than 10 seconds
    requires_cluster: Tests that need a real Kubernetes cluster
    requires_network: Tests that need internet connectivity
    requires_github: Tests that need GitHub API access
    asyncio: Async tests
    network: Network-related tests
    cluster: Cluster management tests

# Async support
asyncio_mode = auto

# Basic output settings
addopts = 
    --strict-markers
    --strict-config
    --verbose
    --tb=short

# Timeout settings
timeout = 300
timeout_method = thread

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Test discovery
norecursedirs = .git .tox dist build *.egg reports __pycache__
